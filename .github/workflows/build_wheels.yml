name: Build wheels

on:
  workflow_call:
    inputs:
      libfranka-version:
        required: true
        type: string
      manylinux-version:
        required: true
        type: string

jobs:
  build_wheels:
    runs-on: ubuntu-latest

    container:
      image: quay.io/pypa/${{ inputs.manylinux-version }}

    env:
      YUM_PACKAGES: zip unzip boost-devel fmt-devel openssl-devel mysql-devel postgresql-devel

    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Patch VERSION with libfranka local label
        # Append a PEP 440 local-version label so the wheel produced here is
        # distinguishable from the upstream franky-control 1.1.3 on PyPI.
        # Without this, `pip install --find-links <our GH release> franky-control`
        # may pick the upstream PyPI wheel instead, since the filenames collide.
        run: |
          base=$(tr -d '[:space:]' < VERSION)
          libfranka_ver="${{ inputs.libfranka-version }}"
          echo "${base}+impedance.libfranka.${libfranka_ver}" > VERSION
          echo "Patched VERSION: $(cat VERSION)"

      - name: Install yum dependencies
        run: yum -y install $YUM_PACKAGES

      - name: Hash system packages
        id: syspkg
        run: echo "hash=$(rpm -q $YUM_PACKAGES | sort | sha256sum | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Cache build dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: /usr/local
          key: deps-${{ inputs.manylinux-version }}-${{ steps.syspkg.outputs.hash }}-${{ hashFiles('docker/common/install-*', 'docker/common/dependency_versions', 'docker/common/*.patch') }}-${{ inputs.libfranka-version }}

      - name: Install other dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          LIBFRANKA_VERSION=${{ inputs.libfranka-version }} ./docker/common/install-dependencies

      - name: Refresh linker cache
        run: ldconfig

      - name: Setting up pip
        run: |
          ./docker/common/manylinux-setup-pip

      - name: Python package
        run: |
          LIBFRANKA_VERSION=${{ inputs.libfranka-version }} ./docker/common/manylinux-build-wheels

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels___${{ inputs.libfranka-version }}___${{ inputs.manylinux-version }}
          path: output/libfranka_*_wheels.zip
